{%  extends "base.html" %}
{%  block content %}
    <h1>Lista de Publicaciones</h1>
    {% for pub in publicacion_list %}
        <div>
            <h2>{{ pub.titulo }}</h2>
            <p>Autor: {{ pub.autor }}</p>
            <p>Fecha de publicación: {{ pub.fecha_publicacion }}</p>
            <a href="{% url 'publicaciones:detalle_publicacion' pub.pk %}">Ver detalle</a>
        </div>
    {% empty %}
        <p>No hay publicaciones disponibles aún.</p>
    {% endfor %}
{%  endblock %}
